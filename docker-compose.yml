services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulito_app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # App connects to PgBouncer (port 6432), not directly to Postgres
      DATABASE_URL: postgresql://${POSTGRES_USER:-pulito_user}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-pulito_trade}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      APP_SECRET: ${APP_SECRET:?APP_SECRET must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '7'
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: pulito_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulito_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-pulito_trade}
    # Postgres is only accessible from PgBouncer, not exposed to host
    ports:
      - '5432:5432'
    expose:
      - '5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c pg_stat_statements.max=10000
      -c log_min_duration_statement=500
      -c log_statement=none
      -c max_connections=50
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pulito_user} -d ${POSTGRES_DB:-pulito_trade}']
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: pulito_pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: ${POSTGRES_USER:-pulito_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      DB_NAME: ${POSTGRES_DB:-pulito_trade}
      LISTEN_PORT: '6432'
      AUTH_TYPE: 'scram-sha-256'
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: '10'
      MAX_CLIENT_CONN: '200'
      MIN_POOL_SIZE: '2'
      RESERVE_POOL_SIZE: '5'
      SERVER_IDLE_TIMEOUT: '600'
    ports:
      - '6432:6432'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -p 6432 -U ${POSTGRES_USER:-pulito_user}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pulito_redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  typesense:
    image: typesense/typesense:27.1
    container_name: pulito_typesense
    restart: unless-stopped
    ports:
      - '8108:8108'
    volumes:
      - typesense_data:/data
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:?TYPESENSE_API_KEY must be set}
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
volumes:
  postgres_data:
  redis_data:
  typesense_data:
