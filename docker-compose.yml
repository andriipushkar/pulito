services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clean_app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # App connects to PgBouncer (port 6432), not directly to Postgres
      DATABASE_URL: postgresql://${POSTGRES_USER:-clean_user}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-clean_shop}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      APP_SECRET: ${APP_SECRET:?APP_SECRET must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '7'
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: clean_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clean_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-clean_shop}
    # Postgres is only accessible from PgBouncer, not exposed to host
    expose:
      - '5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c pg_stat_statements.max=10000
      -c log_min_duration_statement=500
      -c log_statement=none
      -c max_connections=50
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-clean_user} -d ${POSTGRES_DB:-clean_shop}']
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: bitnami/pgbouncer:latest
    container_name: clean_pgbouncer
    restart: unless-stopped
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: '5432'
      POSTGRESQL_USERNAME: ${POSTGRES_USER:-clean_user}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRESQL_DATABASE: ${POSTGRES_DB:-clean_shop}
      PGBOUNCER_DATABASE: ${POSTGRES_DB:-clean_shop}
      PGBOUNCER_PORT: '6432'
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_DEFAULT_POOL_SIZE: '10'
      PGBOUNCER_MAX_CLIENT_CONN: '200'
      PGBOUNCER_MIN_POOL_SIZE: '2'
      PGBOUNCER_RESERVE_POOL_SIZE: '5'
      PGBOUNCER_SERVER_IDLE_TIMEOUT: '600'
    ports:
      - '6432:6432'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -p 6432 -U ${POSTGRES_USER:-clean_user}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clean_redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  typesense:
    image: typesense/typesense:27.1
    container_name: clean_typesense
    restart: unless-stopped
    ports:
      - '8108:8108'
    volumes:
      - typesense_data:/data
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:?TYPESENSE_API_KEY must be set}
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8108/health']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  typesense_data:
