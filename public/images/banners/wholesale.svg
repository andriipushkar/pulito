<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 467" width="1400" height="467">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D47A1"/>
      <stop offset="50%" style="stop-color:#1E88E5"/>
      <stop offset="100%" style="stop-color:#1565C0"/>
    </linearGradient>
    <linearGradient id="gold3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD54F"/>
      <stop offset="50%" style="stop-color:#FFECB3"/>
      <stop offset="100%" style="stop-color:#FFD54F"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="467" fill="url(#bg3)"/>
  <!-- Decorative elements -->
  <circle cx="1250" cy="233" r="280" fill="white" opacity="0.03"/>
  <circle cx="1100" cy="100" r="150" fill="white" opacity="0.04"/>
  <circle cx="-50" cy="400" r="200" fill="white" opacity="0.03"/>
  <!-- Grid pattern -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="800" y1="0" x2="800" y2="467"/><line x1="900" y1="0" x2="900" y2="467"/>
    <line x1="1000" y1="0" x2="1000" y2="467"/><line x1="1100" y1="0" x2="1100" y2="467"/>
    <line x1="700" y1="100" x2="1400" y2="100"/><line x1="700" y1="200" x2="1400" y2="200"/>
    <line x1="700" y1="300" x2="1400" y2="300"/><line x1="700" y1="400" x2="1400" y2="400"/>
  </g>
  <!-- Handshake / partnership icon -->
  <g transform="translate(1050, 150)" opacity="0.1" fill="white">
    <circle cx="80" cy="60" r="70"/>
    <path d="M40 60 L65 80 L80 50 L95 80 L120 60" stroke="white" stroke-width="6" fill="none" opacity="0.5"/>
  </g>
  <!-- Stack of boxes -->
  <g transform="translate(1150, 280)" opacity="0.08" fill="white">
    <rect x="0" y="30" width="70" height="50" rx="5"/>
    <rect x="20" y="0" width="70" height="50" rx="5"/>
    <rect x="80" y="20" width="70" height="50" rx="5"/>
  </g>
  <!-- Main text -->
  <text x="120" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="800" fill="white" letter-spacing="-1">Оптовим</text>
  <text x="120" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="800" fill="white" letter-spacing="-1">покупцям</text>
  <text x="120" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="white" opacity="0.8" font-weight="300">Спеціальні ціни та умови співпраці</text>
  <!-- CTA button -->
  <rect x="120" y="370" width="260" height="52" rx="26" fill="white"/>
  <text x="165" y="403" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0D47A1">Дізнатись більше</text>
  <path d="M350 396 L360 396" stroke="#0D47A1" stroke-width="2" stroke-linecap="round"/>
  <path d="M355 390 L361 396 L355 402" stroke="#0D47A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
