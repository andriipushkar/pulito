<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 467" width="1400" height="467">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="50%" style="stop-color:#1976D2"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="467" fill="url(#bg2)"/>
  <!-- Decorative shapes -->
  <rect x="1100" y="-20" width="250" height="250" rx="60" fill="white" opacity="0.04" transform="rotate(20, 1225, 105)"/>
  <circle cx="1300" cy="380" r="150" fill="white" opacity="0.03"/>
  <circle cx="50" cy="50" r="120" fill="white" opacity="0.03"/>
  <!-- Road line decoration -->
  <g opacity="0.08">
    <line x1="700" y1="440" x2="1400" y2="440" stroke="white" stroke-width="3" stroke-dasharray="20,15"/>
  </g>
  <!-- Truck icon -->
  <g transform="translate(1000, 130)" opacity="0.12" fill="white">
    <rect x="0" y="30" width="180" height="100" rx="10"/>
    <rect x="180" y="60" width="80" height="70" rx="10"/>
    <circle cx="50" cy="140" r="22"/>
    <circle cx="150" cy="140" r="22"/>
    <circle cx="230" cy="140" r="22"/>
    <rect x="190" y="70" width="40" height="30" rx="5" fill="#1565C0" opacity="0.5"/>
  </g>
  <!-- Box icons -->
  <g transform="translate(950, 300)" opacity="0.08" fill="white">
    <rect x="0" y="0" width="50" height="50" rx="5"/>
    <rect x="60" y="10" width="40" height="40" rx="5"/>
    <rect x="30" y="-20" width="35" height="35" rx="5"/>
  </g>
  <!-- Main text -->
  <text x="120" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="800" fill="white" letter-spacing="-1">Безкоштовна</text>
  <text x="120" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="800" fill="white" letter-spacing="-1">доставка</text>
  <text x="120" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="white" opacity="0.8" font-weight="300">При замовленні від <tspan font-weight="600" fill="#FFECB3">1000 ₴</tspan></text>
  <!-- CTA button -->
  <rect x="120" y="370" width="220" height="52" rx="26" fill="white"/>
  <text x="170" y="403" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#1565C0">Детальніше</text>
  <path d="M310 396 L320 396" stroke="#1565C0" stroke-width="2" stroke-linecap="round"/>
  <path d="M315 390 L321 396 L315 402" stroke="#1565C0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
