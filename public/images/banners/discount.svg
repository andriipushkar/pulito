<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 467" width="1400" height="467">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D47A1"/>
      <stop offset="50%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#1E88E5"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD54F"/>
      <stop offset="50%" style="stop-color:#FFECB3"/>
      <stop offset="100%" style="stop-color:#FFD54F"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="467" fill="url(#bg1)"/>
  <!-- Decorative circles -->
  <circle cx="1200" cy="80" r="250" fill="white" opacity="0.04"/>
  <circle cx="1300" cy="350" r="180" fill="white" opacity="0.03"/>
  <circle cx="100" cy="400" r="200" fill="white" opacity="0.03"/>
  <!-- Decorative dots pattern -->
  <g opacity="0.06" fill="white">
    <circle cx="900" cy="50" r="3"/><circle cx="940" cy="50" r="3"/><circle cx="980" cy="50" r="3"/>
    <circle cx="900" cy="80" r="3"/><circle cx="940" cy="80" r="3"/><circle cx="980" cy="80" r="3"/>
    <circle cx="900" cy="110" r="3"/><circle cx="940" cy="110" r="3"/><circle cx="980" cy="110" r="3"/>
  </g>
  <!-- Sale tag icon -->
  <g transform="translate(100, 120)" opacity="0.15">
    <rect x="0" y="0" width="100" height="100" rx="20" fill="white" transform="rotate(15, 50, 50)"/>
  </g>
  <!-- Percentage badge -->
  <g transform="translate(1050, 100)">
    <circle cx="80" cy="80" r="80" fill="white" opacity="0.1"/>
    <circle cx="80" cy="80" r="65" fill="white" opacity="0.08"/>
    <text x="80" y="90" font-family="system-ui, sans-serif" font-size="40" font-weight="800" fill="white" opacity="0.3" text-anchor="middle">%</text>
  </g>
  <!-- Main text -->
  <text x="120" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-1">Знижки до</text>
  <text x="120" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="900" fill="url(#gold1)" letter-spacing="-2">-30%</text>
  <text x="120" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="white" opacity="0.8" font-weight="300">На всю побутову хімію</text>
  <!-- CTA button -->
  <rect x="120" y="380" width="240" height="52" rx="26" fill="white"/>
  <text x="180" y="413" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0D47A1">Дивитись акції</text>
  <path d="M330 406 L340 406" stroke="#0D47A1" stroke-width="2" stroke-linecap="round"/>
  <path d="M335 400 L341 406 L335 412" stroke="#0D47A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
